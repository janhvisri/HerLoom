<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Test Form</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    section { border: 1px solid #ddd; padding: 16px; margin-bottom: 16px; border-radius: 8px; }
    h2 { margin-top: 0; }
    label { display: block; margin: 8px 0 4px; }
    input, textarea, select, button { width: 100%; padding: 8px; margin-bottom: 8px; }
    button { width: auto; cursor: pointer; }
    pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Simple API Test Page</h1>
  <p>Open this file in your browser and use the forms below to call your backend APIs.</p>

  <section>
    <h2>Server Settings</h2>
    <label>API Base URL</label>
    <input id="baseUrl" value="http://localhost:3000" />
    <label>Saved Token</label>
    <textarea id="savedToken" rows="2" readonly></textarea>
    <button type="button" onclick="clearToken()">Clear Token</button>
  </section>

  <section>
    <h2>Login</h2>
    <label>Email</label>
    <input id="loginEmail" value="admin_test_unique@example.com" />
    <label>Password</label>
    <input id="loginPassword" type="password" value="password123" />
    <button type="button" onclick="login()">Login</button>
  </section>

  <section>
    <h2>Create Product</h2>
    <label>Name</label>
    <input id="createName" />
    <label>Description</label>
    <textarea id="createDescription"></textarea>
    <label>Price</label>
    <input id="createPrice" type="number" step="0.01" />
    <label>Category</label>
    <input id="createCategory" />
    <label>Stock</label>
    <input id="createStock" type="number" />
    <label>Image</label>
    <input id="createImage" type="file" accept="image/*" />
    <button type="button" onclick="createProduct()">Create Product</button>
  </section>

  <section>
    <h2>Update Product</h2>
    <label>Product ID</label>
    <input id="updateId" />
    <label>Name</label>
    <input id="updateName" />
    <label>Description</label>
    <textarea id="updateDescription"></textarea>
    <label>Price</label>
    <input id="updatePrice" type="number" step="0.01" />
    <label>Category</label>
    <input id="updateCategory" />
    <label>Stock</label>
    <input id="updateStock" type="number" />
    <label>Image</label>
    <input id="updateImage" type="file" accept="image/*" />
    <button type="button" onclick="updateProduct()">Update Product</button>
  </section>

  <section>
    <h2>Delete Product</h2>
    <label>Product ID</label>
    <input id="deleteId" />
    <button type="button" onclick="deleteProduct()">Delete Product</button>
  </section>

  <section>
    <h2>Read Products</h2>
    <button type="button" onclick="getProducts()">Get All Products</button>
    <button type="button" onclick="getProductById()">Get Product by ID</button>
    <label>Product ID</label>
    <input id="readId" />
  </section>

  <section>
    <h2>Orders</h2>
    <h3>Create Order</h3>
    <label>Items (JSON array of items)</label>
    <textarea id="orderItems" rows="4">[{"product":"6a516342704849e198444ea4","name":"Dummy Premium Phone","price":999.99,"quantity":1}]</textarea>
    <label>Total Amount</label>
    <input id="orderTotal" type="number" step="0.01" value="999.99" />
    <label>Payment ID</label>
    <input id="orderPayment" />
    <label>Address (JSON)</label>
    <textarea id="orderAddress" rows="3">{"street":"123 Test St","city":"Mumbai","state":"Maharashtra","postalCode":"400001","country":"India"}</textarea>
    <button type="button" onclick="createOrder()">Create Order</button>

      <h3>Razorpay</h3>
      <label>Amount</label>
      <input id="razorpayAmount" type="number" step="0.01" value="999.99" />
      <label>Currency</label>
      <input id="razorpayCurrency" value="INR" />
      <label>Razorpay Key ID (test key)</label>
      <input id="razorpayKeyId" value="rzp_test_TBnjPqQbYvjWIp" />
      <button type="button" onclick="createRazorpayOrder()">Create Razorpay Order</button>
      <button type="button" onclick="createAndOpenCheckout()">Create & Open Checkout</button>
      <label>Razorpay Order Response</label>
      <textarea id="razorpayOrderResponse" rows="3" readonly></textarea>
      <label>Razorpay Order ID</label>
      <input id="razorpayOrderId" />
      <label>Razorpay Payment ID</label>
      <input id="razorpayPaymentId" />
      <label>Razorpay Signature</label>
      <input id="razorpaySignature" />
      <button type="button" onclick="verifyRazorpayPayment()">Verify Razorpay Payment</button>


  <section>
    <h2>Response</h2>
    <pre id="response">ready</pre>
  </section>

  <script>
    const tokenField = document.getElementById('savedToken');

    function setResponse(value) {
      document.getElementById('response').innerText = JSON.stringify(value, null, 2);
    }

    function getBaseUrl() {
      return document.getElementById('baseUrl').value.trim();
    }

    function getAuthHeader() {
      const token = tokenField.value.trim();
      return token ? { Authorization: 'Bearer ' + token } : {};
    }

    function clearToken() {
      tokenField.value = '';
      setResponse({ message: 'Token cleared' });
    }

    async function login() {
      const url = getBaseUrl() + '/api/auth/login';
      const body = {
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value,
      };
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (res.ok) {
        tokenField.value = data.token || '';
      }
      setResponse(data);
    }

    async function createProduct() {
      const url = getBaseUrl() + '/api/products';
      const formData = new FormData();
      formData.append('name', document.getElementById('createName').value);
      formData.append('description', document.getElementById('createDescription').value);
      formData.append('price', document.getElementById('createPrice').value);
      formData.append('category', document.getElementById('createCategory').value);
      formData.append('stock', document.getElementById('createStock').value);
      const file = document.getElementById('createImage').files[0];
      if (file) formData.append('image', file);

      const res = await fetch(url, {
        method: 'POST',
        headers: getAuthHeader(),
        body: formData,
      });
      const data = await res.json();
      setResponse(data);
    }

    async function updateProduct() {
      const id = document.getElementById('updateId').value.trim();
      if (!id) return setResponse({ error: 'Product ID is required' });
      const url = getBaseUrl() + '/api/products/' + id;
      const formData = new FormData();
      const name = document.getElementById('updateName').value;
      const description = document.getElementById('updateDescription').value;
      const price = document.getElementById('updatePrice').value;
      const category = document.getElementById('updateCategory').value;
      const stock = document.getElementById('updateStock').value;
      if (name) formData.append('name', name);
      if (description) formData.append('description', description);
      if (price) formData.append('price', price);
      if (category) formData.append('category', category);
      if (stock) formData.append('stock', stock);
      const file = document.getElementById('updateImage').files[0];
      if (file) formData.append('image', file);

      const res = await fetch(url, {
        method: 'PUT',
        headers: getAuthHeader(),
        body: formData,
      });
      const data = await res.json();
      setResponse(data);
    }

    async function deleteProduct() {
      const id = document.getElementById('deleteId').value.trim();
      if (!id) return setResponse({ error: 'Product ID is required' });
      const url = getBaseUrl() + '/api/products/' + id;
      const res = await fetch(url, {
        method: 'DELETE',
        headers: getAuthHeader(),
      });
      const data = await res.json();
      setResponse(data);
    }

    async function getProducts() {
      const url = getBaseUrl() + '/api/products';
      const res = await fetch(url);
      const data = await res.json();
      setResponse(data);
    }

    async function getProductById() {
      const id = document.getElementById('readId').value.trim();
      if (!id) return setResponse({ error: 'Product ID is required' });
      const url = getBaseUrl() + '/api/products/' + id;
      const res = await fetch(url);
      const data = await res.json();
      setResponse(data);
    }

    // Orders
    async function createOrder() {
      const url = getBaseUrl() + '/api/orders';
      let itemsRaw = document.getElementById('orderItems').value.trim();
      let items;
      try { items = JSON.parse(itemsRaw || '[]'); } catch (e) { return setResponse({ error: 'Invalid items JSON' }); }
      if (!items.length) return setResponse({ error: 'Provide at least one item' });
      const totalAmount = Number(document.getElementById('orderTotal').value) || 0;
      const paymentId = document.getElementById('orderPayment').value.trim();
      let addressRaw = document.getElementById('orderAddress').value.trim();
      let address;
      try { address = JSON.parse(addressRaw || '{}'); } catch (e) { return setResponse({ error: 'Invalid address JSON' }); }

      const body = { items, totalAmount, paymentId, address };
      const res = await fetch(url, {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
        body: JSON.stringify(body),
      });
      const data = await res.json();
      setResponse(data);
    }

    async function getMyOrders() {
      const url = getBaseUrl() + '/api/orders/my';
      const res = await fetch(url, { headers: getAuthHeader() });
      const data = await res.json();
      setResponse(data);
    }

    async function getAllOrders() {
      const url = getBaseUrl() + '/api/orders';
      const res = await fetch(url, { headers: getAuthHeader() });
      const data = await res.json();
      setResponse(data);
    }

    async function createRazorpayOrder() {
      const url = getBaseUrl() + '/api/payment/order';
      const amount = Number(document.getElementById('razorpayAmount').value);
      const currency = document.getElementById('razorpayCurrency').value.trim() || 'INR';
      const res = await fetch(url, {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
        body: JSON.stringify({ amount, currency }),
      });
      const data = await res.json();
      document.getElementById('razorpayOrderResponse').value = JSON.stringify(data, null, 2);
      if (data.id) {
        document.getElementById('razorpayOrderId').value = data.id;
      }
      setResponse(data);
    }

    async function createAndOpenCheckout() {
      const key = document.getElementById('razorpayKeyId').value.trim();
      if (!key) return setResponse({ error: 'Enter Razorpay Key ID (test key) first' });

      // Create order on server
      const url = getBaseUrl() + '/api/payment/order';
      const amount = Number(document.getElementById('razorpayAmount').value);
      const currency = document.getElementById('razorpayCurrency').value.trim() || 'INR';
      const res = await fetch(url, {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
        body: JSON.stringify({ amount, currency }),
      });
      const data = await res.json();
      document.getElementById('razorpayOrderResponse').value = JSON.stringify(data, null, 2);
      if (!data || !data.id) return setResponse({ error: 'Failed to create order', detail: data });

      // Open Razorpay checkout
      const orderId = data.id;
      document.getElementById('razorpayOrderId').value = orderId;

      if (typeof Razorpay === 'undefined') {
        const s = document.createElement('script');
        s.src = 'https://checkout.razorpay.com/v1/checkout.js';
        document.head.appendChild(s);
        await new Promise((r) => (s.onload = r));
      }

      const options = {
        key: key,
        amount: Math.round(amount * 100),
        currency: currency,
        order_id: orderId,
        handler: function (response) {
          document.getElementById('razorpayPaymentId').value = response.razorpay_payment_id || '';
          document.getElementById('razorpaySignature').value = response.razorpay_signature || '';
          // auto-verify on server
          fetch(getBaseUrl() + '/api/payment/verify', {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
            body: JSON.stringify(response),
          })
            .then((r) => r.json())
            .then((d) => setResponse(d))
            .catch((e) => setResponse({ error: e.message }));
        },
        prefill: { name: 'Test User', email: 'test@example.com' },
      };

      const rzp = new Razorpay(options);
      rzp.open();
      setResponse(data);
    }

    async function verifyRazorpayPayment() {
      const url = getBaseUrl() + '/api/payment/verify';
      const body = {
        razorpay_order_id: document.getElementById('razorpayOrderId').value.trim(),
        razorpay_payment_id: document.getElementById('razorpayPaymentId').value.trim(),
        razorpay_signature: document.getElementById('razorpaySignature').value.trim(),
      };
      const res = await fetch(url, {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
        body: JSON.stringify(body),
      });
      const data = await res.json();
      setResponse(data);
    }

    async function updateOrderStatus() {
      const id = document.getElementById('orderUpdateId').value.trim();
      const status = document.getElementById('orderStatus').value.trim();
      if (!id || !status) return setResponse({ error: 'Order ID and status required' });
      const url = getBaseUrl() + '/api/orders/' + id + '/status';
      const res = await fetch(url, {
        method: 'PUT',
        headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
        body: JSON.stringify({ status }),
      });
      const data = await res.json();
      setResponse(data);
    }
  </script>
</body>
</html>
